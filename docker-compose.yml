services:
  coral-api:
    build:
      context: .
      target: coral-api
      secrets: [git_auth_token]
    restart: unless-stopped
    networks: [default, coolify]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      HYPIXEL_API_KEY: ${HYPIXEL_API_KEY:-}
      PORT: ${API_PORT:-8000}
      RUST_LOG: ${RUST_LOG:-info}
      STARFISH_HMAC_SECRET: ${STARFISH_HMAC_SECRET:-}
      STARFISH_ED25519_PRIVATE_KEY: ${STARFISH_ED25519_PRIVATE_KEY:-}
      STARFISH_DISCORD_CLIENT_ID: ${STARFISH_DISCORD_CLIENT_ID:-}
      STARFISH_DISCORD_CLIENT_SECRET: ${STARFISH_DISCORD_CLIENT_SECRET:-}
      STARFISH_GITHUB_TOKEN: ${STARFISH_GITHUB_TOKEN:-}
      STARFISH_GITHUB_REPO: ${STARFISH_GITHUB_REPO:-}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:${API_PORT:-8000}/health | grep -q healthy
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.coral-api.rule=Host(`${API_DOMAIN:-api.localhost}`)
      - traefik.http.routers.coral-api.entrypoints=http
      - traefik.http.services.coral-api.loadbalancer.server.port=8000

  coral-web:
    build:
      context: .
      target: coral-web
    restart: unless-stopped
    networks: [default, coolify]
    environment:
      CORAL_API_URL: http://coral-api:${API_PORT:-8000}
      CORAL_INTERNAL_KEY: ${INTERNAL_API_KEY}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      STARFISH_DISCORD_CLIENT_ID: ${STARFISH_DISCORD_CLIENT_ID:-}
      STARFISH_DISCORD_CLIENT_SECRET: ${STARFISH_DISCORD_CLIENT_SECRET:-}
    labels:
      - traefik.enable=true
      - traefik.http.routers.coral-web.rule=Host(`${WEB_DOMAIN:-coral.localhost}`)
      - traefik.http.routers.coral-web.entrypoints=http
      - traefik.http.services.coral-web.loadbalancer.server.port=3000

  coral-bot:
    build:
      context: .
      target: coral-bot
      secrets: [git_auth_token]
    restart: unless-stopped
    networks: [default, coolify]
    depends_on:
      coral-api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CORAL_API_URL: http://coral-api:${API_PORT:-8000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      HYPIXEL_API_KEY: ${HYPIXEL_API_KEY:-}
      VERIFICATION_ROLE_ID: ${VERIFICATION_ROLE_ID:-}
      OWNER_IDS: ${OWNER_IDS:-}
      HOME_GUILD_ID: ${HOME_GUILD_ID:-}
      BLACKLIST_CHANNEL_ID: ${BLACKLIST_CHANNEL_ID:-}
      MOD_CHANNEL_ID: ${MOD_CHANNEL_ID:-}
      REVIEW_FORUM_ID: ${REVIEW_FORUM_ID:-}
      EVIDENCE_FORUM_ID: ${EVIDENCE_FORUM_ID:-}
      RUST_LOG: ${RUST_LOG:-info}

  coral-admin:
    build:
      context: .
      target: coral-admin
      secrets: [git_auth_token]
    restart: unless-stopped
    profiles: [admin]
    networks: [default, coolify]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_PORT: ${ADMIN_PORT:-8080}
      RUST_LOG: ${RUST_LOG:-info}

networks:
  coolify:
    external: true

secrets:
  git_auth_token:
    environment: GIT_AUTH_TOKEN
