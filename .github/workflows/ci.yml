name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Configure private repo access
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            git config --global url."https://$TOKEN@github.com/".insteadOf "https://github.com/"
          fi

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coral-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: coral-web/package-lock.json

      - run: npm ci
      - run: npm run build

  deploy:
    needs: [rust, web]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && vars.COOLIFY_DEPLOY_ENABLED == 'true'
    runs-on: [self-hosted, coral]
    steps:
      - name: Trigger Coolify deploy
        env:
          URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl -fsSL -X POST -H "Authorization: Bearer $TOKEN" "$URL"
