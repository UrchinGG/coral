name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coral-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: coral-web/package-lock.json

      - run: npm ci
      - run: npm run build

  deploy:
    needs: [rust, web]
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: [self-hosted, linux, coral]
    timeout-minutes: 30
    env:
      REGISTRY: localhost:5000
      CORAL_CLIENTS_CONTEXT: /srv/coral/clients

    steps:
      - uses: actions/checkout@v4

      - name: Apply private overlay (Dockerfile, compose, clients crate)
        run: tar -xf /srv/coral/overrides/coral-overrides.tar -C .

      - name: Build coral images
        run: docker compose --profile admin build coral-api coral-bot coral-sync coral-web coral-admin

      - name: Tag + push to local registry
        run: |
          PROJECT=$(basename "$GITHUB_WORKSPACE")
          for svc in coral-api coral-bot coral-sync coral-web coral-admin; do
            docker tag "${PROJECT}-${svc}:latest" "${REGISTRY}/${svc}:latest"
            docker push "${REGISTRY}/${svc}:latest"
          done

      - name: Refresh coral-vm SSH host keys
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -R coral-vm.tailde25ae.ts.net 2>/dev/null || true
          ssh-keyscan -H coral-vm.tailde25ae.ts.net >> ~/.ssh/known_hosts

      - name: Pull new images on coral-vm
        run: |
          ssh debian@coral-vm.tailde25ae.ts.net <<'REMOTE'
            set -e
            cd ~/coral-r730
            docker compose pull coral-api coral-bot coral-sync coral-web coral-admin
          REMOTE

      - name: Roll coral-api (new replica → wait healthy → stop old)
        run: |
          ssh debian@coral-vm.tailde25ae.ts.net <<'REMOTE'
            set -e
            cd ~/coral-r730
            OLD=$(docker compose ps -q coral-api)
            if [ -z "$OLD" ]; then
              docker compose up -d --wait --wait-timeout 180 coral-api
              exit 0
            fi
            docker compose up -d --no-recreate --scale coral-api=2 coral-api
            NEW=$(docker compose ps -q coral-api | grep -v "$OLD" | head -1)
            if [ -z "$NEW" ]; then
              echo "Failed to spawn new replica"; exit 1
            fi
            echo "OLD=$OLD NEW=$NEW"
            for i in $(seq 1 90); do
              h=$(docker inspect --format '{{.State.Health.Status}}' "$NEW" 2>/dev/null || echo missing)
              [ "$h" = "healthy" ] && break
              [ "$h" = "missing" ] && { echo "new container disappeared"; exit 1; }
              sleep 2
            done
            if [ "$h" != "healthy" ]; then
              echo "new replica never healthy ($h), reverting"
              docker logs "$NEW" --tail 80 || true
              docker stop "$NEW" && docker rm -f "$NEW"
              exit 1
            fi
            docker stop "$OLD" && docker rm -f "$OLD"
          REMOTE

      - name: Update bot, sync, web, admin
        run: |
          ssh debian@coral-vm.tailde25ae.ts.net <<'REMOTE'
            set -e
            cd ~/coral-r730
            docker compose up -d --wait --wait-timeout 120 coral-bot coral-sync coral-web coral-admin
            docker image prune -f
          REMOTE

      - name: Verify external endpoint serves the new build
        run: |
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 https://api.urchin.gg/health | grep -q '"status":"healthy"'; then
              echo "external /health passed on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "external /health did not return healthy within 60s"
          exit 1
